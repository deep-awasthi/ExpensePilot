server:
  port: 8080

spring:
  application:
    name: flowbridge-finance-tracker

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finance_tracker}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# FlowBridge Default Configuration (starts with the in-memory local provider)
flowbridge:
  provider: local

# ── Spring Boot Actuator ────────────────────────────────────────────────────
management:
  server:
    port: 8081   # expose management port separately so it is not mixed with API traffic
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: "health,info,metrics,prometheus,loggers,threaddump,env"
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true
  # Surface application name + version in /actuator/info
  info:
    env:
      enabled: true

# ── Application Info (surfaced by /actuator/info) ──────────────────────────
info:
  app:
    name: FlowBridge Finance Tracker
    version: 1.0.0-SNAPSHOT
    description: "Production-grade personal finance management platform"
    event-bus: FlowBridge (local|embedded|kafka)

# ── Application Custom Security Parameters ─────────────────────────────────
app:
  security:
    jwt:
      secret: ${JWT_SECRET:d291bGQtd29ya2luZy1wcm9kdWN0aW9uLWdyYWRlLXNlY3VyZS1rZXktMjU2LWJpdHMtY29tcGxpYW5jZS1mb3ItZmluYW5jZS10cmFja2Vy}
      access-token-expiration-minutes: 15
      refresh-token-expiration-days: 7
